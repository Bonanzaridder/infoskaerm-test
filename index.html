<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">


<style>

html, body{

    margin:0;
    padding:0;

    width:850px;
    height:600px;

    overflow:hidden;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}



.box{

    width:850px;

    height:600px;

    background:#20325A;

    border:5px solid #7D0101;

    border-radius:18px;

    color:white;

    position:relative;

    overflow:hidden;

    box-sizing:border-box;

}



/* ---------- SIDER ---------- */


.page{

    position:absolute;

    inset:0;

    padding:10px 35px 35px 35px;

    box-sizing:border-box;

    opacity:1;

    transition:opacity .8s ease;

}


.hidden{

    opacity:0;

    pointer-events:none;

}





/* ---------- VEJR ---------- */


.weather-title{

    font-size:56px;

    font-weight:800;

    margin-bottom:5px;

}



.today{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:35px;

    margin-top:10px;

    margin-bottom:35px;

}


.big-icon{

    font-size:160px;

}



.today-label{

    font-size:28px;

    font-weight:700;

}



#todayTemp{

    font-size:90px;

    font-weight:800;

}





.days{

    display:flex;

    justify-content:space-between;

}



.day{

    background:rgba(255,255,255,0.12);

    border-radius:18px;

    width:110px;

    height:190px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    font-size:28px;

    font-weight:800;

}



.day .icon{

    font-size:70px;

    margin:15px 0;

}



.temp{

    font-size:36px;

    font-weight:800;

}





/* ---------- DAGSPLAN ---------- */


.message-title{

    font-size:46px;

    font-weight:800;

    margin-bottom:15px;

}



.schedule{

    width:100%;

    border-collapse:collapse;

    font-size:32px;

    font-weight:700;

}



.schedule td{

    padding:6px 0;

}



.schedule td:first-child{

    width:125px;

    color:#FFD54F;

}



.schedule td:last-child{

    padding-left:15px;

}




</style>

</head>


<body>


<div class="box">


<!-- VEJR -->

<div class="page" id="weatherPage">



<div class="today">


<div id="todayIcon" class="big-icon">

☀️

</div>


<div>

<div class="today-label">

I dag

</div>


<div id="todayTemp">

--°

</div>


</div>


</div>



<div class="days" id="forecast"></div>



</div>





<!-- DAGSPLAN -->


<div class="page hidden" id="messagePage">


<div class="message-title">

⏰ Dagsrutine

</div>



<table class="schedule">


<tr><td>07.00</td><td>Morgentur og morgenmad</td></tr>

<tr><td>09.15</td><td>Formiddagsservering</td></tr>

<tr><td>11.55</td><td>Frokost</td></tr>

<tr><td>15.35</td><td>Eftermiddagsservering</td></tr>

<tr><td>18.00</td><td>Aftensmad</td></tr>

<tr><td>21.15</td><td>Aftenservering</td></tr>

<tr><td>21.45</td><td>Egne gange</td></tr>

<tr><td>22.00</td><td>Aflevering af telefon og computer</td></tr>

<tr><td>22.20</td><td>Egne værelser</td></tr>

<tr><td>22.30</td><td>Ro og godnat</td></tr>


</table>


</div>


</div>





<script>


const latitude = 57.08;

const longitude = 9.27;



const weatherIcons = {


0:"☀️",

1:"🌤",

2:"🌤",

3:"☁️",

45:"🌫",

48:"🌫",

51:"🌦",

53:"🌦",

55:"🌧",

61:"🌧",

63:"🌧",

65:"🌧",

71:"❄️",

80:"🌦",

81:"🌧",

82:"⛈",

95:"⛈"


};



const daysDK=[

"Søn",
"Man",
"Tir",
"Ons",
"Tor",
"Fre",
"Lør"

];





fetch(

`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max&timezone=Europe%2FCopenhagen`

)


.then(response=>response.json())


.then(data=>{


document.getElementById("todayTemp").innerHTML =

Math.round(data.daily.temperature_2m_max[0])+"°";



document.getElementById("todayIcon").innerHTML =

weatherIcons[data.daily.weather_code[0]] || "☀️";



let html="";



for(let i=0;i<5;i++){


let date=new Date(data.daily.time[i]);


html += `


<div class="day">

${daysDK[date.getDay()]}


<span class="icon">

${weatherIcons[data.daily.weather_code[i]] || "☀️"}

</span>


<span class="temp">

${Math.round(data.daily.temperature_2m_max[i])}°

</span>


</div>


`;

}



document.getElementById("forecast").innerHTML=html;


});





// SKIFT MELLEM SIDER


let weatherVisible=true;



setInterval(()=>{


if(weatherVisible){

document.getElementById("weatherPage").classList.add("hidden");

document.getElementById("messagePage").classList.remove("hidden");


}else{


document.getElementById("messagePage").classList.add("hidden");

document.getElementById("weatherPage").classList.remove("hidden");


}


weatherVisible=!weatherVisible;


},10000);



</script>


</body>
</html>
