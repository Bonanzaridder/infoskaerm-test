<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">

<style>

html, body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:400px;
    height:230px;
}


.box{

    width:400px;
    height:230px;

    background:#20325A;
    border-radius:18px;

    box-sizing:border-box;
    padding:18px;

    color:white;

    position:relative;

}


/* Sider */
.page{

    position:absolute;
    inset:18px;

    opacity:1;
    transition:opacity 1s ease;

}

.hidden{

    opacity:0;

}


/* Vejr */

.weather-title{

    font-size:22px;
    font-weight:bold;

}


.today{

    display:flex;
    align-items:center;
    gap:12px;

    font-size:34px;
    font-weight:bold;

}


.icon{

    font-size:42px;

}



.days{

    display:flex;
    justify-content:space-between;

    margin-top:12px;

    text-align:center;

}


.day{

    font-size:12px;

}


.day .icon{

    display:block;
    font-size:22px;

}


.temp{

    font-size:14px;

}


/* Besked */

.message-title{

    font-size:22px;
    font-weight:bold;

}


.message{

    margin-top:15px;

    font-size:17px;
    line-height:1.45;

}


</style>

</head>


<body>


<div class="box">


<!-- VEJRSIDE -->

<div class="page" id="weatherPage">


    <div class="weather-title">
        🌤 Fjerritslev
    </div>


    <div class="today">

        <span class="icon" id="todayIcon">
            ☀️
        </span>

        <span id="todayTemp">
            --°
        </span>

    </div>


    <div class="days" id="forecast"></div>


</div>




<!-- BESKEDSIDE -->

<div class="page hidden" id="messagePage">


    <div class="message-title">
        📢 Husk hver dag
    </div>


    <div class="message">

        🍽 Morgenmad<br>
        07.30 - 08.00<br><br>

        📚 Undervisning<br>
        08.15<br><br>

        ☕ Pause<br>
        10.00<br><br>

        🌙 Aftensamling<br>
        21.30

    </div>


</div>



</div>



<script>


// ----------------------
// VEJR
// ----------------------


const latitude = 57.08;
const longitude = 9.27;


const weatherIcons = {

0:"☀️",
1:"🌤",
2:"🌤",
3:"☁️",
45:"🌫",
48:"🌫",
51:"🌦",
53:"🌦",
55:"🌧",
61:"🌧",
63:"🌧",
65:"🌧",
71:"❄️",
80:"🌦",
81:"🌧",
82:"⛈",
95:"⛈"

};


const daysDK=[
"Søn",
"Man",
"Tir",
"Ons",
"Tor",
"Fre",
"Lør"
];



fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max&timezone=Europe%2FCopenhagen`
)

.then(response=>response.json())

.then(data=>{


document.getElementById("todayTemp").innerHTML =
Math.round(data.daily.temperature_2m_max[0])+"°";


document.getElementById("todayIcon").innerHTML =
weatherIcons[data.daily.weather_code[0]] || "🌤";



let html="";


for(let i=0;i<7;i++){


let date=new Date(data.daily.time[i]);


html += `

<div class="day">

${daysDK[date.getDay()]}

<span class="icon">
${weatherIcons[data.daily.weather_code[i]] || "🌤"}
</span>

<span class="temp">
${Math.round(data.daily.temperature_2m_max[i])}°
</span>

</div>

`;

}


document.getElementById("forecast").innerHTML=html;


});




// ----------------------
// SKIFT MELLEM SIDER
// ----------------------


let weatherVisible=true;


setInterval(()=>{


const weather=document.getElementById("weatherPage");
const message=document.getElementById("messagePage");


if(weatherVisible){

    weather.classList.add("hidden");
    message.classList.remove("hidden");

}else{

    message.classList.add("hidden");
    weather.classList.remove("hidden");

}


weatherVisible=!weatherVisible;


},10000);



</script>


</body>
</html>
