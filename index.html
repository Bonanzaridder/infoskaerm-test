<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body{
    margin:0;
    padding:0;
    width:800px;
    height:700px;
    overflow:hidden;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
}

.box{
    width:800px;
    height:700px;
    background:#20325A;
    border-radius:18px;
    color:white;
    position:relative;
    overflow:hidden;
}

/* ---------- SIDER ---------- */

.page{
    position:absolute;
    inset:0;
    padding:35px;
    box-sizing:border-box;

    opacity:1;
    transition:opacity .8s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

/* ---------- VEJR ---------- */

.weather-title{
    font-size:52px;
    font-weight:bold;
    margin-bottom:15px;
}
.today{

    display:flex;
    align-items:center;
    justify-content:center;

    gap:40px;

    margin-top:20px;
    margin-bottom:50px;

}


.big-icon{

    font-size:150px;

}


.today-label{

    font-size:38px;
    font-weight:bold;

}


#todayTemp{

    font-size:100px;
    font-weight:bold;

}
.today{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.today .icon{
    font-size:130px;
}

#todayTemp{
    font-size:110px;
    font-weight:bold;
}

.days{
    display:flex;
    justify-content:space-between;
}

.day{

    background:rgba(255,255,255,0.12);

    border-radius:15px;

    width:90px;
    height:140px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    font-size:26px;
    font-weight:bold;

}

.day .icon{

    display:block;

    font-size:55px;

    margin:12px 0;

}

.temp{

    font-size:30px;
    font-weight:bold;

}

/* ---------- BESKED ---------- */

.message-title{
    font-size:34px;
    font-weight:bold;
    margin-bottom:25px;
}

.schedule{
    width:100%;
    border-collapse:collapse;
    font-size:24px;
}

.schedule td{
    padding:8px 0;
}

.schedule td:first-child{
    width:120px;
    color:#FFD54F;
    font-weight:bold;
}

.schedule td:last-child{
    padding-left:15px;
}

</style>
</head>

<body>

<div class="box">

<!-- VEJR -->

<div class="page" id="weatherPage">

    <div class="weather-title">
        🌤 Fjerritslev
    </div>

   <div class="today">

    <div id="todayIcon" class="big-icon">
        ☀️
    </div>

    <div class="today-info">

        <div class="today-label">
            I dag
        </div>

        <div id="todayTemp">
            --°
        </div>

    </div>

</div>

    <div class="days" id="forecast"></div>

</div>

<!-- BESKED -->

<div class="page hidden" id="messagePage">

    <div class="message-title">
        📅 Dagsrutine
    </div>

    <table class="schedule">

        <tr><td>07.00</td><td>Morgentur og morgenmad</td></tr>
        <tr><td>09.15</td><td>Formiddagsservering</td></tr>
        <tr><td>11.55</td><td>Frokost</td></tr>
        <tr><td>15.35</td><td>Eftermiddagsservering</td></tr>
        <tr><td>18.00</td><td>Aftensmad</td></tr>
        <tr><td>21.15</td><td>Aftenservering</td></tr>
        <tr><td>21.45</td><td>Egne gange</td></tr>
        <tr><td>22.00</td><td>Aflevering af telefon og computer</td></tr>
        <tr><td>22.20</td><td>Egne værelser</td></tr>
        <tr><td>22.30</td><td>Ro og godnat</td></tr>

    </table>

</div>

</div>

<script>

const latitude = 57.08;
const longitude = 9.27;

const weatherIcons = {
0:"☀️",
1:"🌤",
2:"🌤",
3:"☁️",
45:"🌫",
48:"🌫",
51:"🌦",
53:"🌦",
55:"🌧",
61:"🌧",
63:"🌧",
65:"🌧",
71:"❄️",
80:"🌦",
81:"🌧",
82:"⛈",
95:"⛈"
};

const daysDK=[
"Søn",
"Man",
"Tir",
"Ons",
"Tor",
"Fre",
"Lør"
];
    fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max&timezone=Europe%2FCopenhagen`
)

.then(response => response.json())

.then(data => {

    // Dagens temperatur
    document.getElementById("todayTemp").innerHTML =
        Math.round(data.daily.temperature_2m_max[0]) + "°";

    // Dagens ikon
    document.getElementById("todayIcon").innerHTML =
        weatherIcons[data.daily.weather_code[0]] || "🌤";

    // De næste 7 dage
    let html = "";

    for(let i = 0; i < 7; i++){

        let date = new Date(data.daily.time[i]);

        html += `

        <div class="day">

            ${daysDK[date.getDay()]}

            <span class="icon">
                ${weatherIcons[data.daily.weather_code[i]] || "🌤"}
            </span>

            <span class="temp">
                ${Math.round(data.daily.temperature_2m_max[i])}°
            </span>

        </div>

        `;

    }

    document.getElementById("forecast").innerHTML = html;

})

.catch(error => {

    console.log(error);

    document.getElementById("forecast").innerHTML =
        "Kunne ikke hente vejret.";

});


// --------------------------------------
// SKIFT MELLEM VEJR OG BESKED
// --------------------------------------

const weatherPage = document.getElementById("weatherPage");
const messagePage = document.getElementById("messagePage");

let weatherVisible = true;

setInterval(() => {

    if(weatherVisible){

        weatherPage.classList.add("hidden");
        messagePage.classList.remove("hidden");

    }else{

        messagePage.classList.add("hidden");
        weatherPage.classList.remove("hidden");

    }

    weatherVisible = !weatherVisible;

},10000);
    </script>

</body>
</html>
