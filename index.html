<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">

<style>

html, body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:400px;
    height:230px;
}


.box{
    width:400px;
    height:230px;

    background:#20325A;
    border-radius:18px;

    box-sizing:border-box;
    padding:16px;

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}


/* Vejr */
.weather-title{
    font-size:20px;
    font-weight:bold;
}

.today{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:32px;
    font-weight:bold;
}

.icon{
    font-size:40px;
}


.days{
    display:flex;
    justify-content:space-between;
    text-align:center;
    margin-top:5px;
}

.day{
    font-size:12px;
}

.day .icon{
    font-size:20px;
    display:block;
}

.temp{
    font-size:14px;
}


/* Besked */
.message{
    border-top:1px solid rgba(255,255,255,.3);
    padding-top:8px;

    font-size:13px;
    line-height:1.35;
}

.message-title{
    font-size:15px;
    font-weight:bold;
}

</style>

</head>


<body>


<div class="box">


    <div>

        <div class="weather-title">
            🌤 Fjerritslev
        </div>


        <div class="today">
            <span class="icon" id="todayIcon">☀️</span>
            <span id="todayTemp">--°</span>
        </div>


        <div class="days" id="forecast">

        </div>

    </div>



    <div class="message">

        <div class="message-title">
            📢 Husk hver dag
        </div>

        🍽 Morgenmad 07.30 - 08.00<br>
        📚 Undervisning 08.15<br>
        ☕ Pause 10.00<br>
        🍽 Middag 12.00<br>
        🌙 Aftensamling 21.30

    </div>


</div>



<script>


// BESKEDER ÆNDRES HER
// Ret bare tiderne ovenfor


// VEJR FRA OPEN-METEO

const latitude = 57.08;
const longitude = 9.27;


const weatherIcons = {

    0:"☀️",
    1:"🌤",
    2:"🌤",
    3:"☁️",
    45:"🌫",
    48:"🌫",
    51:"🌦",
    53:"🌦",
    55:"🌧",
    61:"🌧",
    63:"🌧",
    65:"🌧",
    71:"❄️",
    80:"🌦",
    81:"🌧",
    82:"⛈",
    95:"⛈"

};


const daysDK = [
    "Søn",
    "Man",
    "Tir",
    "Ons",
    "Tor",
    "Fre",
    "Lør"
];


fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max&timezone=Europe%2FCopenhagen`
)

.then(response => response.json())

.then(data => {


    document.getElementById("todayTemp").innerHTML =
        Math.round(data.daily.temperature_2m_max[0]) + "°";


    document.getElementById("todayIcon").innerHTML =
        weatherIcons[data.daily.weather_code[0]] || "🌤";



    let html="";


    for(let i=0;i<7;i++){


        let date = new Date(
            data.daily.time[i]
        );


        html += `

        <div class="day">

            ${daysDK[date.getDay()]}

            <span class="icon">
            ${weatherIcons[data.daily.weather_code[i]] || "🌤"}
            </span>

            <span class="temp">
            ${Math.round(data.daily.temperature_2m_max[i])}°
            </span>

        </div>

        `;

    }


    document.getElementById("forecast").innerHTML = html;


});


</script>


</body>
</html>
