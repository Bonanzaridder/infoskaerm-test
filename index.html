<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">

<style>

html, body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* Kun så stor som widgeten */
body{
    width:320px;
    height:180px;
}

/* Selve boksen */
.box{

    width:320px;
    height:180px;

    background:#20325A;

    border-radius:18px;

    box-sizing:border-box;

    padding:24px;

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

}

/* Overskrift */
.title{
    font-size:34px;
    font-weight:bold;
}

/* Klokken */
.clock{
    font-size:92px;
    font-weight:bold;
    line-height:1;
}

/* Dato */
.date{
    font-size:28px;
    opacity:.9;
}

</style>

</head>

<body>

<div class="box">

    <div class="title">
        Han Herred Efterskole
    </div>

    <div class="clock" id="clock"></div>

    <div class="date" id="date"></div>

</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("da-DK",{
            hour:"2-digit",
            minute:"2-digit"
        });

    document.getElementById("date").innerHTML =
        now.toLocaleDateString("da-DK",{
            weekday:"long",
            day:"numeric",
            month:"long",
            year:"numeric"
        });

}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
