<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* Selve boksen */
.widget{

    width:560px;
    height:320px;

    background:#20325A;

    border-radius:20px;

    color:white;

    padding:20px;

    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* Overskrift */
.title{
    font-size:34px;
    font-weight:bold;
}

/* Klokken */
.clock{
    font-size:90px;
    font-weight:bold;
}

/* Dato */
.date{
    font-size:28px;
    opacity:.9;
}
</style>

</head>

<body>

<div class="widget">

<div class="title">
Han Herred Efterskole
</div>

<div class="clock" id="clock"></div>

<div class="date" id="date"></div>

</div>

<script>

function update(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString("da-DK",{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("date").innerHTML=
now.toLocaleDateString("da-DK",{
weekday:"long",
day:"numeric",
month:"long"
});

}

update();
setInterval(update,1000);

</script>

</body>
</html>
