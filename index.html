<!DOCTYPE html>
<html lang="da">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">


<style>


html, body{

    margin:0;
    padding:0;

    width:850px;
    height:600px;

    overflow:hidden;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}



.box{

    width:850px;
    height:600px;

    background:#20325A;

    border:5px solid #7D0101;

    border-radius:18px;

    color:white;

    position:relative;

    overflow:hidden;

    box-sizing:border-box;

}



/* ---------- SIDER ---------- */


.page{

    position:absolute;

    inset:0;

    padding:10px 35px 35px 35px;

    box-sizing:border-box;

    opacity:1;

    transition:opacity .8s ease;

}


.hidden{

    opacity:0;

    pointer-events:none;

}



/* ---------- VEJR ---------- */


.today{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:30px;

    margin-top:10px;

    margin-bottom:35px;

}



.big-icon{

    width:160px;

    height:160px;

    display:flex;

    align-items:center;

    justify-content:center;

}



.big-icon svg{

    width:100%;

    height:100%;

}



.today-info{

    text-align:center;

}



.today-label{

    font-size:28px;

    font-weight:700;

}



#todayTemp{

    font-size:90px;

    font-weight:800;

    line-height:1;

}



#todayExtra{

    font-size:22px;

    font-weight:700;

    line-height:1.4;

    margin-top:10px;

}



#todayDetails{

    width:230px;

    font-size:22px;

    font-weight:700;

    line-height:1.4;

}



#todayDetails div{

    display:flex;

    align-items:center;

    gap:8px;

}



#todayDetails svg{

    width:35px;

    height:35px;

}



/* ---------- 5 DAGE ---------- */


.days{

    display:flex;

    justify-content:space-between;

    margin-top:25px;

}



.day{

    background:rgba(255,255,255,0.12);

    border-radius:18px;

    width:110px;

    height:190px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    font-size:28px;

    font-weight:800;

}



.day .icon svg{

    width:65px;

    height:65px;

}



.temp{

    font-size:36px;

    font-weight:800;

}
/* ---------- DAGSPLAN ---------- */


.message-title{

    font-size:46px;

    font-weight:800;

    margin-bottom:15px;

}



.schedule{

    width:100%;

    border-collapse:collapse;

    font-size:32px;

    font-weight:700;

}



.schedule td{

    padding:6px 0;

}



.schedule td:first-child{

    width:125px;

    color:#FFD54F;

}



.schedule td:last-child{

    padding-left:15px;

}



</style>

</head>


<body>


<div class="box">


<!-- VEJR -->


<div class="page" id="weatherPage">



<div class="today">


<div id="todayIcon" class="big-icon">

☀️

</div>



<div class="today-info">


<div class="today-label">

I DAG

</div>


<div id="todayTemp">

--°

</div>


<div id="todayExtra">

</div>


</div>



<div id="todayDetails">

</div>



</div>



<div class="days" id="forecast"></div>



</div>





<!-- DAGSRUTINE -->


<div class="page hidden" id="messagePage">


<div class="message-title">

⏰ Dagsrutine

</div>



<table class="schedule">


<tr><td>07.00</td><td>Morgentur og morgenmad</td></tr>

<tr><td>09.15</td><td>Formiddagsservering</td></tr>

<tr><td>11.55</td><td>Frokost</td></tr>

<tr><td>15.35</td><td>Eftermiddagsservering</td></tr>

<tr><td>18.00</td><td>Aftensmad</td></tr>

<tr><td>21.15</td><td>Aftenservering</td></tr>

<tr><td>21.45</td><td>Egne gange</td></tr>

<tr><td>22.00</td><td>Aflevering af telefon og computer</td></tr>

<tr><td>22.20</td><td>Egne værelser</td></tr>

<tr><td>22.30</td><td>Ro og godnat</td></tr>


</table>


</div>


</div>





<script>


const latitude = 57.08;

const longitude = 9.27;



function weatherIcon(code){


if(code === 0){

return `

<svg viewBox="0 0 100 100">

<circle cx="50" cy="50" r="25" fill="#FFD54F"/>

</svg>

`;

}



if(code === 1 || code === 2){

return `

<svg viewBox="0 0 120 100">


<circle cx="40" cy="35" r="22" fill="#FFD54F"/>


<path d="M35 75

C20 75 20 55 35 55

C40 35 75 40 75 60

C95 60 95 80 75 80Z"

fill="white"/>


</svg>

`;

}


if(code === 3){

return `

<svg viewBox="0 0 120 100">


<path d="M30 75

C10 75 15 50 35 50

C45 25 85 35 85 60

C105 60 105 80 85 80Z"

fill="white"/>


</svg>

`;

}
if(code >= 51 && code <= 67){

return `

<svg viewBox="0 0 120 120">

<path d="M30 65
C10 65 15 40 35 40
C45 15 85 25 85 50
C105 50 105 70 85 70Z"

fill="white"/>


<line x1="40" y1="80" x2="35" y2="105"
stroke="#5DADE2"
stroke-width="6"/>


<line x1="70" y1="80" x2="65" y2="105"
stroke="#5DADE2"
stroke-width="6"/>


</svg>

`;

}



if(code >= 80 && code <= 82){

return `

<svg viewBox="0 0 120 120">

<path d="M30 65
C10 65 15 40 35 40
C45 15 85 25 85 50
C105 50 105 70 85 70Z"

fill="white"/>


<line x1="40" y1="80" x2="35" y2="105"
stroke="#3498DB"
stroke-width="7"/>


<line x1="70" y1="80" x2="65" y2="105"
stroke="#3498DB"
stroke-width="7"/>


</svg>

`;

}



return `

<svg viewBox="0 0 100 100">

<circle cx="50" cy="50" r="25" fill="#FFD54F"/>

</svg>

`;

}





const daysDK=[

"Søn",
"Man",
"Tir",
"Ons",
"Tor",
"Fre",
"Lør"

];





fetch(

`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max,uv_index_max&hourly=weather_code,wind_speed_10m&timezone=Europe%2FCopenhagen`

)


.then(response=>response.json())


.then(data=>{


// Temperatur i dag

document.getElementById("todayTemp").innerHTML =

Math.round(data.daily.temperature_2m_max[0])+"°";



// Stort ikon

document.getElementById("todayIcon").innerHTML =

weatherIcon(data.daily.weather_code[0]);




// Formiddag / eftermiddag / aften


document.getElementById("todayDetails").innerHTML =

`

<div>

${weatherIcon(data.hourly.weather_code[9])}

Formiddag

</div>


<div>

${weatherIcon(data.hourly.weather_code[14])}

Eftermiddag

</div>


<div>

${weatherIcon(data.hourly.weather_code[20])}

Aften

</div>

`;




// UV og vind

document.getElementById("todayExtra").innerHTML =

`

UV ${Math.round(data.daily.uv_index_max[0])}

<br>

Vind ${Math.round(data.hourly.wind_speed_10m[12])} km/t

`;





// De næste 5 dage


let html="";



for(let i=0;i<5;i++){


let date=new Date(data.daily.time[i]);


html += `


<div class="day">


${daysDK[date.getDay()]}


<span class="icon">

${weatherIcon(data.daily.weather_code[i])}

</span>


<span class="temp">

${Math.round(data.daily.temperature_2m_max[i])}°

</span>


</div>


`;

}



document.getElementById("forecast").innerHTML=html;



})



.catch(error=>{


console.log(error);


document.getElementById("forecast").innerHTML=

"Kunne ikke hente vejret";


});





// SKIFT MELLEM VEJR OG DAGSRUTINE


let weatherVisible=true;



setInterval(()=>{


if(weatherVisible){


document.getElementById("weatherPage").classList.add("hidden");


document.getElementById("messagePage").classList.remove("hidden");


}

else{


document.getElementById("messagePage").classList.add("hidden");


document.getElementById("weatherPage").classList.remove("hidden");


}


weatherVisible=!weatherVisible;



},10000);



</script>


</body>

</html>
