<!DOCTYPE html>
<html lang="da">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">


<style>


html, body {

    margin:0;
    padding:0;

    width:850px;
    height:600px;

    overflow:hidden;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}



/* HOVEDBOKS */

.box {

    width:850px;
    height:600px;

    background:#20325A;

    border:5px solid #7D0101;

    border-radius:18px;

    color:white;

    box-sizing:border-box;

    overflow:hidden;

    position:relative;

}



/* SIDER */

.page {

    position:absolute;

    inset:0;

    padding:20px 35px 30px 35px;

    box-sizing:border-box;

    opacity:1;

    transition:opacity .8s ease;

}


.hidden {

    opacity:0;

    pointer-events:none;

}



/* =====================
        VEJR
===================== */


.today {

    display:flex;

    justify-content:center;

    align-items:center;

    gap:35px;

    margin-top:15px;

    margin-bottom:30px;

}



.big-icon {

    width:150px;

    height:150px;

    display:flex;

    align-items:center;

    justify-content:center;

}


.big-icon svg {

    width:100%;

    height:100%;

}



.today-info {

    text-align:center;

}


#todayDetails {

    font-size:22px;

    font-weight:700;

    line-height:1.5;

    margin-top:10px;

}



.today-label {

    font-size:28px;

    font-weight:700;

}



#todayTemp {

    font-size:95px;

    font-weight:800;

    line-height:1;

}





.uv {

    text-align:center;

    font-size:24px;

    font-weight:700;

    margin-top:-20px;

    margin-bottom:20px;

}





.days {

    display:flex;

    justify-content:space-between;

    gap:12px;

}



.day {

    background:rgba(255,255,255,0.12);

    border-radius:18px;

    width:140px;

    height:180px;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    font-size:28px;

    font-weight:800;

}



.day .icon svg {

    width:70px;

    height:70px;

}



.temp {

    font-size:36px;

    font-weight:800;

    margin-top:5px;

}



/* =====================
       DAGSRUTINE
===================== */


.message-title {

    font-size:46px;

    font-weight:800;

    margin-bottom:20px;

}



.schedule {

    width:100%;

    border-collapse:collapse;

    font-size:30px;

    font-weight:700;

}



.schedule td {

    padding:5px 0;

}



.schedule td:first-child {

    width:130px;

    color:#FFD54F;

    font-weight:800;

}



.schedule td:last-child {

    padding-left:20px;

}


</style>

</head>


<body>


<div class="box">


<!-- VEJRSIDE -->

<div class="page" id="weatherPage">


<div class="today">


<div id="todayIcon" class="big-icon"></div>


<div class="today-info">


<div class="today-label">

I dag

</div>


<div id="todayTemp">
--°
</div>

<div id="todayDetails">

</div>


</div>


</div>


<div class="uv" id="uvIndex">

UV indeks: --

</div>


<div class="days" id="forecast"></div>


</div>



<!-- DAGSRUTINE -->


<div class="page hidden" id="messagePage">


<div class="message-title">

⏰ Dagsrutine

</div>


<table class="schedule">


<tr><td>07.00</td><td>Morgentur og morgenmad</td></tr>

<tr><td>09.15</td><td>Formiddagsservering</td></tr>

<tr><td>11.55</td><td>Frokost</td></tr>

<tr><td>15.35</td><td>Eftermiddagsservering</td></tr>

<tr><td>18.00</td><td>Aftensmad</td></tr>

<tr><td>21.15</td><td>Aftenservering</td></tr>

<tr><td>21.45</td><td>Egne gange</td></tr>

<tr><td>22.00</td><td>Aflevering af telefon og computer</td></tr>

<tr><td>22.20</td><td>Egne værelser</td></tr>

<tr><td>22.30</td><td>Ro og godnat</td></tr>


</table>


</div>
<script>


const latitude = 57.08;
const longitude = 9.27;



/* =====================
       VEJRIKONER
===================== */


function weatherIcon(code){


if(code === 0){

return `

<svg viewBox="0 0 120 120">

<circle cx="60" cy="60" r="28" fill="#FFD54F"/>

</svg>

`;

}



if(code === 1 || code === 2){


return `

<svg viewBox="0 0 140 120">


<circle cx="45" cy="45" r="25" fill="#FFD54F"/>


<path d="
M40 90
C20 90 20 65 40 65
C45 40 85 45 90 70
C110 70 110 95 90 95
Z"

fill="#FFFFFF"/>


</svg>

`;

}




if(code === 3){


return `

<svg viewBox="0 0 140 120">


<path d="
M35 90
C15 90 15 65 35 65
C45 40 85 45 90 70
C110 70 110 95 90 95
Z"

fill="#FFFFFF"/>


</svg>

`;

}





if(code >= 51 && code <= 67){


return `

<svg viewBox="0 0 140 140">


<path d="
M35 75
C15 75 15 50 35 50
C45 25 90 35 90 60
C115 60 115 85 90 85
Z"

fill="#FFFFFF"/>


<line x1="45" y1="95"
x2="40" y2="120"
stroke="#5DADE2"
stroke-width="7"/>


<line x1="75" y1="95"
x2="70" y2="120"
stroke="#5DADE2"
stroke-width="7"/>


</svg>

`;

}





if(code >= 80 && code <= 82){


return `

<svg viewBox="0 0 140 140">


<path d="
M35 75
C15 75 15 50 35 50
C45 25 90 35 90 60
C115 60 115 85 90 85
Z"

fill="#FFFFFF"/>



<line x1="45" y1="95"
x2="40" y2="120"
stroke="#3498DB"
stroke-width="8"/>



<line x1="75" y1="95"
x2="70" y2="120"
stroke="#3498DB"
stroke-width="8"/>


</svg>

`;

}





if(code >= 95){


return `

<svg viewBox="0 0 140 140">


<path d="
M35 75
C15 75 15 50 35 50
C45 25 90 35 90 60
C115 60 115 85 90 85
Z"

fill="#FFFFFF"/>


<polyline points="
65,90
50,115
65,110
55,135"

fill="none"

stroke="#FFD54F"

stroke-width="8"/>


</svg>

`;

}




return `

<svg viewBox="0 0 120 120">

<circle cx="60" cy="60" r="28" fill="#FFD54F"/>

</svg>

`;

}




const daysDK = [

"Søn",
"Man",
"Tir",
"Ons",
"Tor",
"Fre",
"Lør"

];





/* =====================
       HENT VEJR
===================== */



fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max,uv_index_max&hourly=weather_code,temperature_2m,precipitation_probability,wind_speed_10m&timezone=Europe%2FCopenhagen`
)



.then(response => response.json())


.then(data => {



/* Temperatur i dag */


document.getElementById("todayTemp").innerHTML =

Math.round(data.daily.temperature_2m_max[0]) + "°";





/* Dagens ikon */


document.getElementById("todayIcon").innerHTML =

weatherIcon(data.daily.weather_code[0]);





/* UV indeks */


document.getElementById("uvIndex").innerHTML = "";

// Dagens detaljer

let morning = "☀️";
let afternoon = "☀️";
let evening = "☀️";

let rainHour = null;


// Find vejret i tidsperioder

data.hourly.time.forEach((time,index)=>{


let hour = new Date(time).getHours();

let code = data.hourly.weather_code[index];

let rain = data.hourly.precipitation_probability[index];



if(hour >= 8 && hour <= 11){

    morning = weatherIcon(code);

}


if(hour >= 12 && hour <= 17){

    afternoon = weatherIcon(code);

}


if(hour >= 18 && hour <= 22){

    evening = weatherIcon(code);

}



// Find første tidspunkt med høj regnsandsynlighed

if(
hour > new Date().getHours()
&& rain > 50
&& rainHour === null
){

rainHour = hour;

}


});



let rainText = "";


if(rainHour){

rainText =
"<br>🌧 Regn forventes kl. " 
+ rainHour;

}



document.getElementById("todayDetails").innerHTML =

`
<div>
${morning} Formiddag
</div>

<div>
${afternoon} Eftermiddag
</div>

<div>
${evening} Aften
</div>

<br>

<div>
💨 Vind ${Math.round(data.hourly.wind_speed_10m[12])} km/t
</div>

<div>
☀️ UV ${Math.round(data.daily.uv_index_max[0])}
</div>

${rainText}

`;




/* De næste 5 dage */


let html = "";



for(let i = 0; i < 5; i++){



let date = new Date(data.daily.time[i]);



html += `


<div class="day">


${daysDK[date.getDay()]}



<span class="icon">


${weatherIcon(data.daily.weather_code[i])}


</span>



<span class="temp">

${Math.round(data.daily.temperature_2m_max[i])}°

</span>



</div>



`;

}



document.getElementById("forecast").innerHTML = html;



})


.catch(error => {


console.log(error);


document.getElementById("forecast").innerHTML =

"Kunne ikke hente vejret";


});

// =====================
// SKIFT MELLEM VEJR OG DAGSRUTINE
// =====================


let weatherVisible = true;


setInterval(() => {


    const weatherPage = document.getElementById("weatherPage");

    const messagePage = document.getElementById("messagePage");



    if(weatherVisible){


        weatherPage.classList.add("hidden");

        messagePage.classList.remove("hidden");


    } else {


        messagePage.classList.add("hidden");

        weatherPage.classList.remove("hidden");


    }


    weatherVisible = !weatherVisible;


},10000);



</script>


</body>

</html>
