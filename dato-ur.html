<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

<style>

html, body {

    margin:0;
    padding:0;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}


/* Hele boksen */

.box {

    width:650px;
    height:170px;

    background:#20325A;

    color:white;

    border-radius:18px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    box-sizing:border-box;

    padding:15px;

}



/* Dato */

.date {

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    font-size:34px;

    font-weight:800;

    white-space:nowrap;

}



/* Ur */

.clock {

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    margin-top:20px;

    font-size:55px;

    font-weight:800;

    white-space:nowrap;

}



/* Ikoner */

.icon {

    font-size:45px;

    flex-shrink:0;

}


</style>

</head>


<body>


<div class="box">


    <div class="date">

        <span class="icon">
            📅
        </span>

        <span id="date"></span>

    </div>



    <div class="clock">

        <span class="icon">
            🕒
        </span>

        <span id="clock"></span>

    </div>


</div>



<script>


function updateInfo(){


    const now = new Date();



    const weekdays = [
        "SØNDAG",
        "MANDAG",
        "TIRSDAG",
        "ONSDAG",
        "TORSDAG",
        "FREDAG",
        "LØRDAG"
    ];



    const months = [
        "JANUAR",
        "FEBRUAR",
        "MARTS",
        "APRIL",
        "MAJ",
        "JUNI",
        "JULI",
        "AUGUST",
        "SEPTEMBER",
        "OKTOBER",
        "NOVEMBER",
        "DECEMBER"
    ];



    const dateText =
        weekdays[now.getDay()] +
        " D. " +
        now.getDate() +
        ". " +
        months[now.getMonth()];



    document.getElementById("date").innerHTML = dateText;



    document.getElementById("clock").innerHTML =

        now.toLocaleTimeString(
            "da-DK",
            {
                hour:"2-digit",
                minute:"2-digit",
                second:"2-digit"
            }
        );


}



updateInfo();


setInterval(updateInfo,1000);


</script>


</body>
</html>
