<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

<style>

html, body {

    margin:0;
    padding:0;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}


/* Hele boksen */

.box {

    width:850px;
    height:200px;

    background:#20325A;
    border:5px solid #7D0101;

    color:white;

    border-radius:18px;

    box-sizing:border-box;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    padding:15px;

}



/* Dato */

.date {

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    font-size:42px;

    font-weight:800;

    white-space:nowrap;

}



/* Ur */

.clock {

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    margin-top:18px;

    font-size:75px;

    font-weight:800;

    white-space:nowrap;

}


#clockMain {

    font-size:85px;

    font-weight:800;

}



#clockSeconds {

    font-size:35px;

    font-weight:800;

    position:relative;

    top:-25px;

    margin-left:3px;

}


/* Ikoner */

.icon {

    font-size:55px;

    flex-shrink:0;

}


</style>

</head>


<body>


<div class="box">


    <div class="date">

        <span class="icon">
            📅
        </span>

        <span id="date"></span>

    </div>



    <div class="clock">

    <span class="icon">
        🕒
    </span>

    <span>
        <span id="clockMain"></span><sup id="clockSeconds"></sup>
    </span>

</div>


</div>



<script>


function updateInfo(){


    const now = new Date();



    const weekdays = [
        "SØNDAG",
        "MANDAG",
        "TIRSDAG",
        "ONSDAG",
        "TORSDAG",
        "FREDAG",
        "LØRDAG"
    ];



    const months = [
        "JANUAR",
        "FEBRUAR",
        "MARTS",
        "APRIL",
        "MAJ",
        "JUNI",
        "JULI",
        "AUGUST",
        "SEPTEMBER",
        "OKTOBER",
        "NOVEMBER",
        "DECEMBER"
    ];



    const dateText =
        weekdays[now.getDay()] +
        " D. " +
        now.getDate() +
        ". " +
        months[now.getMonth()];



    document.getElementById("date").innerHTML = dateText;



   let hours = String(now.getHours()).padStart(2,"0");

   let minutes = String(now.getMinutes()).padStart(2,"0");

   let seconds = String(now.getSeconds()).padStart(2,"0");


   document.getElementById("clockMain").innerHTML =
   hours + ":" + minutes;


   document.getElementById("clockSeconds").innerHTML =
   seconds;


}



updateInfo();


setInterval(updateInfo,1000);


</script>


</body>
</html>
