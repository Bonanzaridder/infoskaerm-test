<!DOCTYPE html>
<html lang="da">

<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">


<style>


html, body {

    margin:0;
    padding:0;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}




.box {

    width:950px;

    height:870px;

    background:#20325A;

    border:5px solid #7D0101;

    border-radius:18px;

    color:white;

    box-sizing:border-box;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:60px;

}




.title {

    font-size:75px;

    font-weight:800;

    line-height:1.1;

    margin-bottom:30px;

}




.intro {

    font-size:38px;

    font-weight:700;

    margin-bottom:55px;

}




.program-title {

    font-size:48px;

    font-weight:800;

    margin-bottom:35px;

}




.program {

    width:100%;

    font-size:32px;

    font-weight:700;

    text-align:left;

}




.program div {

    display:flex;

    align-items:flex-start;

    margin-bottom:20px;

}




.program span {

    width:240px;

    flex-shrink:0;

    color:#FFD54F;

    font-weight:800;

}




</style>


</head>


<body>


<div class="box">



<div class="title">

VELKOMMEN

</div>



<div class="intro">

Vi glæder os til et fantastisk år sammen!

</div>



<div class="program-title">

Dagens program

</div>



<div class="program">



<div>

<span>13.00 - 14.30</span>

Ankomst, inkvartering og kaffe

</div>



<div>

<span>14.30 - 15.30</span>

Velkomst i hallen

</div>



<div>

<span>15.30</span>

Møde med kontaktlærerne

</div>



<div>

<span>16.15</span>

Afrejse for forældre

</div>



</div>



</div>


</body>

</html>
