<!DOCTYPE html>
<html lang="da">

<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">


<style>

html, body {

    margin:0;
    padding:0;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}


.box {

    width:1020px;

    height:870px;

    background:#20325A;

    border:5px solid #7D0101;

    border-radius:18px;

    color:white;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    box-sizing:border-box;

    padding:60px;

}



.icon {

    font-size:110px;

    margin-bottom:30px;

}



.title {

    font-size:75px;

    font-weight:800;

    line-height:1.1;

    margin-bottom:40px;

}



.text {

    font-size:42px;

    font-weight:700;

    line-height:1.4;

}



</style>


</head>


<body>


<div class="box">


<div class="icon">

👋

</div>


<div class="title">

VELKOMMEN

</div>


<div class="text">

Vi glæder os til et fantastisk år sammen!

<br><br>

Han Herred Efterskole

</div>


</div>


</body>

</html>
