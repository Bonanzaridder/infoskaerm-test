<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">

<style>

html, body{

    margin:0;
    padding:0;

    background:transparent;

    font-family:Arial, Helvetica, sans-serif;

}


/* Hele boksen */

.date-box{

    width:700px;

    height:90px;

    background:#20325A;

    color:white;

    border-radius:18px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:18px;

    box-sizing:border-box;

    padding:0 20px;

}


/* Kalenderikon */

.icon{

    font-size:56px;

    flex-shrink:0;

}


/* Dato */

#date{

    font-size:52px;

    font-weight:bold;

    text-transform:uppercase;

    white-space:nowrap;

    line-height:1;

}

</style>

</head>

<body>

<div class="date-box">

    <span class="icon">
        📅
    </span>

    <span id="date"></span>

</div>

<script>

function updateDate(){

    const now = new Date();

    const weekdays = [
        "SØNDAG",
        "MANDAG",
        "TIRSDAG",
        "ONSDAG",
        "TORSDAG",
        "FREDAG",
        "LØRDAG"
    ];

    const months = [
        "JANUAR",
        "FEBRUAR",
        "MARTS",
        "APRIL",
        "MAJ",
        "JUNI",
        "JULI",
        "AUGUST",
        "SEPTEMBER",
        "OKTOBER",
        "NOVEMBER",
        "DECEMBER"
    ];

    const text =
        weekdays[now.getDay()] +
        " D. " +
        now.getDate() +
        ". " +
        months[now.getMonth()];

    document.getElementById("date").innerHTML = text;

}

updateDate();

setInterval(updateDate,60000);

</script>

</body>
</html>
