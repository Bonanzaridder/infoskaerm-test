<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">

<style>

html, body {

    margin:0;
    padding:0;

    background:transparent;

    font-family:Arial, Helvetica, sans-serif;

}


/* Ur-boksen */

.clock-box {

    width:420px;
    height:130px;

    background:#20325A;

    color:white;

    border-radius:18px;

    display:flex;

    align-items:center;

    box-sizing:border-box;

    padding:20px;

    gap:20px;

}


/* Ur ikon */

.icon {

    font-size:65px;

    flex-shrink:0;

}


/* Selve tiden */

#clock {

    font-size:65px;

    font-weight:bold;

    font-family:"Courier New", monospace;

    letter-spacing:2px;

    white-space:nowrap;

}



</style>

</head>


<body>


<div class="clock-box">


    <span class="icon">
        🕒
    </span>


    <span id="clock">
        00:00:00
    </span>


</div>



<script>


function updateClock(){


    const now = new Date();


    document.getElementById("clock").innerHTML =

        now.toLocaleTimeString(
            "da-DK",
            {
                hour:"2-digit",
                minute:"2-digit",
                second:"2-digit"
            }
        );


}


updateClock();


setInterval(updateClock,1000);



</script>


</body>
</html>
