<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

<style>

html, body{

    margin:0;
    padding:0;

    background:transparent;

    font-family:'Montserrat', Arial, sans-serif;

}


/* Hele boksen */

.clock-box{

    width:420px;

    height:90px;

    background:#20325A;

    color:white;

    border-radius:18px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:18px;

    box-sizing:border-box;

    padding:0 20px;

}


/* Ur ikon */

.icon{

    font-size:56px;

    flex-shrink:0;

}


/* Klokken */

#clock{

    font-size:52px;

    font-weight:800;

    letter-spacing:2px;

    white-space:nowrap;

    line-height:1;

}



</style>

</head>


<body>


<div class="clock-box">


    <span class="icon">
        🕒
    </span>


    <span id="clock"></span>


</div>



<script>


function updateClock(){

    const now = new Date();


    document.getElementById("clock").innerHTML =

        now.toLocaleTimeString(
            "da-DK",
            {
                hour:"2-digit",
                minute:"2-digit",
                second:"2-digit"
            }
        );

}


updateClock();


setInterval(updateClock,1000);



</script>


</body>
</html>
